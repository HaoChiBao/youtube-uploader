<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>YouTube Uploader</title>
  <style>
    :root { font-family: system-ui, sans-serif; color: #111; background: #f6f6f8; }
    body { max-width: 960px; margin: 0 auto; padding: 1.5rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
    .sub { color: #555; margin-bottom: 1.5rem; }
    section { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
    h2 { font-size: 1.1rem; margin: 0 0 0.75rem; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th, td { text-align: left; padding: 0.4rem 0.5rem; border-bottom: 1px solid #eee; }
    .ok { color: #0a7; font-weight: 600; }
    .bad { color: #c33; font-weight: 600; }
    .warn { color: #a60; }
    button, .btn { background: #111; color: #fff; border: none; padding: 0.45rem 0.85rem; border-radius: 6px; cursor: pointer; font-size: 0.85rem; margin-right: 0.4rem; }
    button.secondary { background: #666; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.refreshing { position: relative; padding-left: 1.75rem; }
    button.refreshing::before {
      content: "";
      position: absolute;
      left: 0.55rem;
      top: 50%;
      width: 0.85rem;
      height: 0.85rem;
      margin-top: -0.425rem;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-overlay { opacity: 0.55; pointer-events: none; }
    #storage-info { font-size: 0.8rem; color: #666; margin-bottom: 0.5rem; }
    .actions { margin-top: 0.75rem; }
    #toast { position: fixed; bottom: 1rem; right: 1rem; background: #111; color: #fff; padding: 0.6rem 1rem; border-radius: 6px; display: none; max-width: 360px; }
    .features { font-size: 0.85rem; columns: 2; gap: 1rem; }
    .features li { margin-bottom: 0.25rem; }
    #run-status { font-size: 0.85rem; color: #444; margin-top: 0.5rem; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>YouTube Uploader</h1>
  <p class="sub">Local dashboard — channels, queue, and uploads. API docs at <a href="/docs">/docs</a></p>
  <div id="toast"></div>

  <section>
    <h2>Actions</h2>
    <div class="actions">
      <button id="btn-connect">Connect YouTube channel</button>
      <button class="secondary" id="btn-refresh">Refresh</button>
      <button class="secondary" id="btn-features">Toggle features list</button>
    </div>
    <div id="run-status"></div>
  </section>

  <section id="channels-section">
    <h2>Authenticated channels</h2>
    <p id="storage-info"></p>
    <table>
      <thead><tr><th>Channel</th><th>Auth</th><th>Pending</th><th>Actions</th></tr></thead>
      <tbody id="channels-body"><tr><td colspan="4">Loading…</td></tr></tbody>
    </table>
  </section>

  <section id="jobs-section">
    <h2>Upload queue (pending)</h2>
    <label>Filter: <select id="channel-filter"><option value="">All channels</option></select></label>
    <table>
      <thead><tr><th>#</th><th>Channel</th><th>Job ID</th><th>Title</th><th>Actions</th></tr></thead>
      <tbody id="jobs-body"><tr><td colspan="5">Loading…</td></tr></tbody>
    </table>
  </section>

  <section id="features-section" hidden>
    <h2>YouTube upload features</h2>
    <ul class="features" id="features-list"></ul>
  </section>

  <script>
    const API = '';

    function toast(msg, isError) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.style.background = isError ? '#c33' : '#111';
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 5000);
    }

    function authBadge(auth) {
      if (auth.valid) return '<span class="ok">authenticated</span>';
      if (auth.has_token) return '<span class="warn">' + auth.status + '</span>';
      return '<span class="bad">not connected</span>';
    }

    async function api(path, opts) {
      const res = await fetch(API + path, opts);
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || res.statusText);
      }
      return res.json();
    }

    async function loadDashboard(force) {
      const qs = force ? '?refresh=true' : '';
      const data = await api('/v1/dashboard' + qs);
      dashboardData = data;
      const channels = data.channels || [];
      const storageEl = document.getElementById('storage-info');
      const cacheNote = data.cached ? ' · cached' : '';
      if (data.config_uri) {
        storageEl.textContent = 'Config: ' + data.config_uri + ' (' + (data.storage || 'local') + ')' + cacheNote;
      } else {
        storageEl.textContent = '';
      }
      const tbody = document.getElementById('channels-body');
      const filter = document.getElementById('channel-filter');
      const prev = filter.value;
      filter.innerHTML = '<option value="">All channels</option>';
      if (!channels.length) {
        tbody.innerHTML = '<tr><td colspan="4">No channels — click Connect YouTube channel</td></tr>';
        renderJobs([]);
        return channels;
      }
      tbody.innerHTML = channels.map(ch => `
        <tr>
          <td><strong>${ch.name}</strong><br><small>${ch.id}${ch.custom_url ? ' ' + ch.custom_url : ''}</small></td>
          <td>${authBadge(ch.auth)}</td>
          <td>${ch.pending_count}</td>
          <td>
            <button data-upload="${ch.id}" ${!ch.auth.valid || !ch.pending_count ? 'disabled' : ''}>Upload 1</button>
            <button class="secondary" data-upload-all="${ch.id}" ${!ch.auth.valid || !ch.pending_count ? 'disabled' : ''}>Upload all</button>
            <button class="secondary" data-reauth="${ch.id}">Reauth</button>
          </td>
        </tr>`).join('');
      channels.forEach(ch => {
        const opt = document.createElement('option');
        opt.value = ch.id;
        opt.textContent = ch.id + ' (' + ch.pending_count + ' pending)';
        filter.appendChild(opt);
      });
      if (prev) filter.value = prev;
      renderJobs(data.jobs || []);
      return channels;
    }

    let dashboardData = null;

    function renderJobs(jobs) {
      const channel = document.getElementById('channel-filter').value;
      const filtered = channel ? jobs.filter(j => j.channel_id === channel) : jobs;
      const tbody = document.getElementById('jobs-body');
      if (!filtered.length) {
        tbody.innerHTML = '<tr><td colspan="5">No pending jobs</td></tr>';
        return;
      }
      tbody.innerHTML = filtered.map((j, i) => `
        <tr>
          <td>${i + 1}</td>
          <td>${j.channel_id}</td>
          <td><code>${j.id}</code></td>
          <td>${j.title || '(no title)'}</td>
          <td>
            <button data-remove="${j.channel_id}" data-job="${j.id}">Remove</button>
          </td>
        </tr>`).join('');
    }

    async function loadChannels() {
      await loadDashboard(false);
      return dashboardData ? dashboardData.channels : [];
    }

    async function loadJobs() {
      if (dashboardData && dashboardData.jobs) {
        renderJobs(dashboardData.jobs);
        return;
      }
      const channel = document.getElementById('channel-filter').value;
      const qs = channel ? '?channel=' + encodeURIComponent(channel) + '&status=pending' : '?status=pending';
      const jobs = await api('/v1/jobs' + qs);
      renderJobs(jobs);
    }

    async function pollRun(runId) {
      const statusEl = document.getElementById('run-status');
      for (let i = 0; i < 120; i++) {
        const st = await api('/v1/runs/' + runId);
        statusEl.textContent = 'Run ' + runId + ': ' + st.status +
          (st.total ? ' — uploaded ' + st.uploaded + '/' + st.total : '');
        if (st.status === 'completed' || st.status === 'completed_with_errors' || st.status === 'failed') {
          if (st.urls && st.urls.length) statusEl.textContent += '\n' + st.urls.join('\n');
          await refresh();
          toast(st.status === 'completed' ? 'Upload complete' : 'Run finished: ' + st.status, st.status === 'failed');
          return;
        }
        await new Promise(r => setTimeout(r, 2000));
      }
    }

    async function startUpload(channelId, count) {
      const body = count === null ? { upload_retries: 5 } : { count: count, upload_retries: 5 };
      const res = await api('/v1/channels/' + encodeURIComponent(channelId) + '/runs', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      toast('Upload started');
      pollRun(res.run_id);
    }

    async function refresh() {
      const btn = document.getElementById('btn-refresh');
      const channelsSection = document.getElementById('channels-section');
      const jobsSection = document.getElementById('jobs-section');
      btn.disabled = true;
      btn.classList.add('refreshing');
      btn.textContent = 'Refreshing…';
      channelsSection.classList.add('loading-overlay');
      jobsSection.classList.add('loading-overlay');
      try {
        await loadDashboard(true);
      } finally {
        btn.disabled = false;
        btn.classList.remove('refreshing');
        btn.textContent = 'Refresh';
        channelsSection.classList.remove('loading-overlay');
        jobsSection.classList.remove('loading-overlay');
      }
    }

    document.getElementById('btn-refresh').onclick = refresh;

    document.getElementById('btn-connect').onclick = async () => {
      const res = await api('/v1/oauth/start', { method: 'POST' });
      window.location.href = res.auth_url;
    };

    document.getElementById('channel-filter').onchange = () => {
      if (dashboardData && dashboardData.jobs) renderJobs(dashboardData.jobs);
      else loadJobs();
    };

    document.getElementById('channels-body').onclick = async (e) => {
      const t = e.target;
      if (t.dataset.upload) startUpload(t.dataset.upload, 1);
      if (t.dataset.uploadAll) startUpload(t.dataset.uploadAll, null);
      if (t.dataset.reauth) {
        const res = await api('/v1/channels/' + encodeURIComponent(t.dataset.reauth) + '/oauth/start', { method: 'POST' });
        window.location.href = res.auth_url;
      }
    };

    document.getElementById('jobs-body').onclick = async (e) => {
      const t = e.target;
      if (t.dataset.remove) {
        if (!confirm('Remove job ' + t.dataset.job + '?')) return;
        await api('/v1/channels/' + encodeURIComponent(t.dataset.remove) + '/jobs/' + encodeURIComponent(t.dataset.job), { method: 'DELETE' });
        toast('Removed');
        refresh();
      }
    };

    document.getElementById('btn-features').onclick = async () => {
      const sec = document.getElementById('features-section');
      if (!sec.hidden) { sec.hidden = true; return; }
      const cap = await api('/v1/capabilities');
      document.getElementById('features-list').innerHTML = cap.youtube_features.map(f =>
        '<li><strong>' + f.name + '</strong> — ' + f.description + '</li>').join('');
      sec.hidden = false;
    };

    (function init() {
      const params = new URLSearchParams(window.location.search);
      if (params.get('oauth_success')) toast('Connected channel: ' + params.get('oauth_success'));
      if (params.get('oauth_error')) toast('OAuth error: ' + params.get('oauth_error'), true);
      if (params.has('oauth_success') || params.has('oauth_error')) {
        history.replaceState({}, '', '/');
      }
      refresh();
    })();
  </script>
</body>
</html>
