<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in — YouTube Uploader</title>
  <style>
    :root { font-family: system-ui, sans-serif; color: #111; background: #f6f6f8; }
    body { max-width: 420px; margin: 4rem auto; padding: 1.5rem; }
    section { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 1.5rem; }
    h1 { font-size: 1.25rem; margin: 0 0 0.5rem; }
    p { color: #555; font-size: 0.9rem; margin: 0 0 1rem; }
    label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.35rem; }
    input { width: 100%; box-sizing: border-box; padding: 0.55rem 0.65rem; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; margin-bottom: 1rem; }
    button { width: 100%; background: #111; color: #fff; border: none; padding: 0.6rem; border-radius: 6px; font-size: 0.95rem; cursor: pointer; }
    button:disabled { opacity: 0.6; cursor: wait; }
    .error { color: #c33; font-size: 0.85rem; margin-bottom: 0.75rem; display: none; }
  </style>
</head>
<body>
  <section>
    <h1>Sign in</h1>
    <p>Enter your dashboard password or API token to access the uploader.</p>
    <div id="error" class="error"></div>
    <form id="login-form">
      <label for="secret">Password or API token</label>
      <input id="secret" name="secret" type="password" autocomplete="current-password" required autofocus />
      <button type="submit" id="submit">Sign in</button>
    </form>
  </section>
  <script>
    const form = document.getElementById('login-form');
    const errorEl = document.getElementById('error');
    const submitBtn = document.getElementById('submit');
    const next = new URLSearchParams(location.search).get('next') || '/';

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.style.display = 'none';
      submitBtn.disabled = true;
      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ password: document.getElementById('secret').value }),
        });
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.detail || 'Sign in failed');
        }
        location.href = next;
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
